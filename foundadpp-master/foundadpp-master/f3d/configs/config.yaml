# configs/config.yaml
defaults:
  - _self_
  - app: train_dinov3 # merge/extend on top of app: default

diy_name: "_pretrained"

# train / AD
mode: train

modal: rgb

data:
  batch_size: 8
  num_workers: 0
  pin_mem: true
  dataset: dataset-name
  data_name: fewshot-folder-name
  data_path: /path/to/fewshot-folder
  train_root: ${data.data_path}/${data.data_name}
  test_root: /path/to/dataset
  mvtec_classnames:                            
    - bottle
    - cable
    - capsule
    - carpet
    - grid
    - hazelnut
    - leather
    - metal_nut
    - pill
    - screw
    - tile
    - toothbrush
    - transistor
    - wood
    - zipper

  visa_classnames:                            
    - candle
    - capsules
    - cashew
    - chewinggum
    - fryum
    - macaroni1
    - macaroni2
    - pcb1
    - pcb2
    - pcb3
    - pcb4
    - pipe_fryum
  
  mvtec_3d_classnames:
    - bagel
    - cable_gland
    - carrot
    - cookie
    - dowel
    - foam
    - peach
    - potato
    - rope
    - tire

  use_hflip: True
  use_vflip: True
  use_rotate90: True
  use_color_jitter: False
  use_gray: False
  use_blur: False

optimization:
  weight_decay: 1e-4
  epochs: 4000
  lr: 0.001
  lr_config: const # const, cosine, step, cosine_warmup
  min_lr: 1e-4 # for cosine and cosine_warmup
  warmup_epoch: 100 # cosine_warmup
  step_size: 300 # step
  gamma: 0.1 # step
  
  

testing:
  K_top_mvtec: 10    
  K_top_visa: 6         
  expect_fpr: 0.3     
  max_steps: 200      
  segmentation_vis: True

memory_bank:
  use: false
  knn_num: 7

devices: [cuda:0]

dist:
  master_addr: localhost
  master_port: 40112
  backend: nccl

hydra:
  run:
    dir: .
  output_subdir: null
  job:
    chdir: false
